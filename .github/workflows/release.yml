name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Create or update the release pull request
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run required checks for the release pull request
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          branch="$(python -c 'import json, os; print(json.loads(os.environ["RELEASE_PR"])["headBranchName"])')"
          title="$(python -c 'import json, os; print(json.loads(os.environ["RELEASE_PR"])["title"])')"
          gh workflow run ci.yml --ref "$branch" -f "pr-title=$title"

  release-assets:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Attach distributions to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG_NAME" dist/*.whl dist/*.tar.gz --clobber
