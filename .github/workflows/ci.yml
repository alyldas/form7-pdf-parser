name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Validate Conventional Commit title
        shell: python
        run: |
          import os
          import re

          title = os.environ["PR_TITLE"]
          pattern = re.compile(
              r"(?:build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)"
              r"(?:\([a-z0-9][a-z0-9._/-]*\))?!?: [a-z0-9].*"
          )
          if not pattern.fullmatch(title):
              raise SystemExit(
                  "PR title must use Conventional Commits: "
                  "type(scope?): lowercase summary"
              )

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest

  package:
    needs: [quality, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Smoke-test built wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/form7-wheel-smoke
          /tmp/form7-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/form7-wheel-smoke/bin/form7-pdf --version
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14
