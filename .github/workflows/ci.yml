name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Validate Conventional Commit title
        shell: python
        run: |
          import os
          import re

          title = os.environ["PR_TITLE"]
          pattern = re.compile(
              r"(?:build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)"
              r"(?:\([a-z0-9][a-z0-9._/-]*\))?!?: [a-z0-9].*"
          )
          if not pattern.fullmatch(title):
              raise SystemExit(
                  "PR title must use Conventional Commits: "
                  "type(scope?): lowercase summary"
              )

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest

  minimum-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: >-
          python -m pip install
          "pypdf==6.14.2"
          "reportlab==4.2.0"
          "pytest>=8.3"
          "pytest-cov>=6"
      - run: python -m pip install --no-deps -e .
      - run: python -m pip check
      - run: pytest

  platform-smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -o "addopts=-ra --strict-config --strict-markers"

  package:
    needs: [quality, tests, minimum-dependencies, platform-smoke]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify prerequisite jobs
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          MINIMUM_DEPENDENCIES_RESULT: ${{ needs.minimum-dependencies.result }}
          PLATFORM_SMOKE_RESULT: ${{ needs.platform-smoke.result }}
        run: |
          test "$QUALITY_RESULT" = success
          test "$TESTS_RESULT" = success
          test "$MINIMUM_DEPENDENCIES_RESULT" = success
          test "$PLATFORM_SMOKE_RESULT" = success
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Smoke-test built wheel
        shell: bash
        run: |
          set -euo pipefail
          python -m venv /tmp/form7-wheel-smoke
          /tmp/form7-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/form7-wheel-smoke/bin/form7-pdf --version
          /tmp/form7-wheel-smoke/bin/python -m form7_pdf_parser --version
          python -m venv /tmp/form7-sdist-smoke
          /tmp/form7-sdist-smoke/bin/python -m pip install dist/*.tar.gz
          /tmp/form7-sdist-smoke/bin/form7-pdf --version
          /tmp/form7-sdist-smoke/bin/python -m form7_pdf_parser --version
      - uses: actions/upload-artifact@v7
        with:
          name: distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14
