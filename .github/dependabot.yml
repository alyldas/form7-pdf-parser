version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels: [dependencies, python]
    groups:
      python-development-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Moscow
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels: [dependencies, github_actions]
    groups:
      github-actions:
        patterns: ["*"]
