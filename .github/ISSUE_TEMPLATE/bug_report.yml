name: Bug report
description: Report a reproducible parser or annotation problem using synthetic data.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Production shipping documents and personal data must not be attached.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: Output of form7-pdf --version
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Area
      options:
        - Python API
        - parse command
        - annotate command
        - packaging or installation
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: Include the error text and a minimal synthetic reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not attach real PDFs, names, addresses, phones, payment details, or active tracking numbers.
          required: true
        - label: I tested the latest released version.
          required: true
